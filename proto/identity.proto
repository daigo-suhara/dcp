syntax = "proto3";

package dcloud.identity.v1;

option go_package = "github.com/daigo-suhara/dcloud/internal/pb/identitypb;identitypb";

service IdentityService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Me(MeRequest) returns (MeResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

message Empty {}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string timestamp = 3;
}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string name = 4;
  string created_at = 5;
  string updated_at = 6;
}

message Session {
  string token = 1;
  string expires_at = 2;
}

message RegisterResponse {
  User user = 1;
  Session session = 2;
}

message LoginResponse {
  User user = 1;
  Session session = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message MeRequest {
  string session_token = 1;
}

message MeResponse {
  User user = 1;
}

message LogoutRequest {
  string session_token = 1;
}

message LogoutResponse {}
