apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcloud.fullname" . }}-console-nginx
  labels:
    {{- include "dcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
data:
  default.conf: |
    server {
      listen 8080;
      server_name {{ .Values.console.publicHostname | quote }};
      absolute_redirect off;
      port_in_redirect off;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://{{ include "dcloud.fullname" . }}-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-authentik-username $http_x_authentik_username;
        proxy_set_header X-authentik-email $http_x_authentik_email;
        proxy_set_header X-authentik-uid $http_x_authentik_uid;
        proxy_set_header X-authentik-name $http_x_authentik_name;
      }

      location /container/ {
        proxy_pass http://{{ include "dcloud.fullname" . }}-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-authentik-username $http_x_authentik_username;
        proxy_set_header X-authentik-email $http_x_authentik_email;
        proxy_set_header X-authentik-uid $http_x_authentik_uid;
        proxy_set_header X-authentik-name $http_x_authentik_name;
      }

    }

    server {
      listen 8080;
      server_name ~^(?!{{ first (splitList "." .Values.console.publicHostname) }}$)[a-z0-9-]+\.{{ .Values.console.publicServiceDomain | replace "." "\\." }}$;
      absolute_redirect off;
      port_in_redirect off;

      location / {
        proxy_pass http://{{ include "dcloud.fullname" . }}-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-authentik-username $http_x_authentik_username;
        proxy_set_header X-authentik-email $http_x_authentik_email;
        proxy_set_header X-authentik-uid $http_x_authentik_uid;
        proxy_set_header X-authentik-name $http_x_authentik_name;
      }
    }
