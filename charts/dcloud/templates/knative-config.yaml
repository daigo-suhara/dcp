apiVersion: v1
kind: ConfigMap
metadata:
  name: config-network
  namespace: knative-serving
data:
  # Disable Knative's automatic TLS provisioning for custom domain mappings.
  # TLS termination is handled at the ingress/LoadBalancer level using the
  # platform's wildcard certificate (*.drkatana.com), which is accepted by
  # Cloudflare Full SSL mode without requiring per-domain certificates.
  external-domain-tls: "Disabled"
