apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcloud.fullname" . }}-api
  labels:
    {{- include "dcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "dcloud.fullname" . }}-internal
      containers:
        - name: api
          image: {{ include "dcloud.image" (dict "root" . "repository" .Values.api.image.repository) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "dcloud.fullname" . }}-database
          env:
            - name: DCLD_PUBLIC_SERVICE_DOMAIN
              value: {{ .Values.publicServiceDomain | quote }}
            - name: DCLD_CONSOLE_PUBLIC_URL
              value: {{ printf "https://%s" .Values.console.publicHostname | quote }}
            - name: DCLD_AUTHENTIK_BASE_URL
              value: {{ .Values.authentik.baseUrl | quote }}
            - name: DCLD_CONTAINER_GRPC_ADDR
              value: {{ include "dcloud.fullname" . }}-container:{{ .Values.container.service.port }}
            - name: PYTHONPATH
              value: /app:/app/generated
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 2
            failureThreshold: 60
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcloud.fullname" . }}-api
  labels:
    {{- include "dcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
