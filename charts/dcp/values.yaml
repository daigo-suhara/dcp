image:
  registry: ghcr.io
  repositoryOwner: daigo-suhara
  pullPolicy: Always
  tag: latest

storage:
  createClass: true
  className: dcp-ceph-rbd
  clusterID: rook-ceph
  pool: rbd

core:
  replicaCount: 1
  image:
    repository: dcp-core
  service:
    port: 8080
  publicServiceDomain: drkatana.com

console:
  replicaCount: 1
  image:
    repository: dcp-console
  service:
    type: LoadBalancer
    port: 8080
  publicServiceDomain: drkatana.com
  publicHostname: cloud.daigo-suhara.com

cloudrun:
  replicaCount: 1
  image:
    repository: dcp-cloudrun
  service:
    port: 8080

keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.6.2"
  database:
    image:
      repository: postgres
      tag: "16-alpine"
    name: keycloak
    username: keycloak
    password: dcp-keycloak-db-change-me
    storageSize: 10Gi
  baseUrl: ""
  hostnameUrl: "https://cloud.daigo-suhara.com/keycloak"
  realm: dcp
  displayName: D Cloud
  clientId: dcp-core
  clientName: D Cloud Core
  clientSecret: ""
  loginTheme: dcp
  sessionSecret: dcp-session-secret-change-me
  adminUsername: admin
  adminPassword: dcp-keycloak-admin-change-me
