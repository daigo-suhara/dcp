apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
type: Opaque
stringData:
  admin-password: {{ .Values.keycloak.adminPassword | quote }}
  db-password: {{ .Values.keycloak.database.password | quote }}
  session-secret: {{ .Values.keycloak.sessionSecret | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-realm
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
data:
  realm.json: |
    {
      "realm": {{ .Values.keycloak.realm | default "dcp" | quote }},
      "enabled": true,
      "registrationAllowed": true,
      "clients": [
        {
          "clientId": {{ .Values.keycloak.clientId | default "dcp-core" | quote }},
          "name": "DCP Core",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "protocol": "openid-connect",
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-postgres
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-postgres
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-postgres
spec:
  serviceName: {{ include "dcp.fullname" . }}-keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: keycloak-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.keycloak.database.image.repository }}:{{ .Values.keycloak.database.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.keycloak.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.keycloak.database.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dcp.fullname" . }}-keycloak
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.keycloak.database.username | quote }}
                - -d
                - {{ .Values.keycloak.database.name | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        labels:
          {{- include "dcp.labels" . | nindent 10 }}
          app.kubernetes.io/component: keycloak-postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.storage.className | quote }}
        resources:
          requests:
            storage: {{ .Values.keycloak.database.storageSize | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - start
            - --import-realm
            - --http-relative-path=/keycloak
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dcp.fullname" . }}-keycloak
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: {{ include "dcp.fullname" . }}-keycloak-postgres
            - name: KC_DB_URL_DATABASE
              value: {{ .Values.keycloak.database.name | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dcp.fullname" . }}-keycloak
                  key: db-password
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HOSTNAME_STRICT
              value: "false"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/realm.json
              subPath: realm.json
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "dcp.fullname" . }}-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak
