apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
type: Opaque
stringData:
  admin-password: {{ .Values.keycloak.adminPassword | quote }}
  db-password: {{ .Values.keycloak.database.password | quote }}
  session-secret: {{ .Values.keycloak.sessionSecret | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-realm
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
data:
  realm.json: |
    {
      "realm": {{ .Values.keycloak.realm | default "dcp" | quote }},
      "displayName": {{ .Values.keycloak.displayName | default "D Cloud" | quote }},
      "enabled": true,
      "registrationAllowed": true,
      "internationalizationEnabled": true,
      "supportedLocales": ["en", "ja"],
      "defaultLocale": "ja",
      "loginTheme": {{ .Values.keycloak.loginTheme | default "dcp" | quote }},
      "clients": [
        {
          "clientId": {{ .Values.keycloak.clientId | default "dcp-core" | quote }},
          "name": {{ .Values.keycloak.clientName | default "D Cloud Core" | quote }},
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": ["*"],
          "webOrigins": ["*"],
          "protocol": "openid-connect",
          "attributes": {
            "pkce.code.challenge.method": "S256"
          }
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-theme
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
data:
  theme.properties: |
    parent=keycloak
    locales=en,ja
    styles=css/login.css css/dcp.css
  messages_ja.properties: |
    loginTitle=D Cloud にログイン
    loginTitleHtml=D Cloud にログイン
    loginAccountTitle=D Cloud にログイン
    welcome=D Cloud へようこそ
    doLogIn=ログイン
    doRegister=ユーザー登録
    usernameOrEmail=ユーザー名またはメールアドレス
    password=パスワード
    rememberMe=ログイン状態を保持
    doForgotPassword=パスワードを忘れた場合
    noAccount=アカウントをお持ちでない場合は
    identity-provider-login-label=または外部アカウントでログイン
    invalidUserMessage=ユーザー名またはメールアドレスが正しくありません
    invalidUsernameMessage=ユーザー名が正しくありません
    invalidPasswordMessage=パスワードが正しくありません
    accountDisabledMessage=アカウントが無効です
    invalidEmailMessage=メールアドレスが正しくありません
    backToLogin=ログイン画面に戻る
    errorTitle=認証エラー
    errorIntro=入力内容を確認してください
  dcp.css: |
    .login-pf body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 24%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.05), transparent 26%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 45%, #eef2f7 100%);
      color: #0f172a;
    }

    .login-pf .card-pf {
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 12px;
      box-shadow: 0 18px 36px rgba(15, 23, 42, 0.10);
      background: rgba(255, 255, 255, 0.96);
    }

    .login-pf #kc-header-wrapper {
      color: #0f172a;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .login-pf #kc-form,
    .login-pf #kc-content {
      padding-top: 0;
    }

    .login-pf .pf-c-form-control,
    .login-pf input[type="text"],
    .login-pf input[type="password"],
    .login-pf input[type="email"] {
      border-radius: 10px;
      border-color: rgba(148, 163, 184, 0.38);
      box-shadow: none;
    }

    .login-pf .pf-c-button,
    .login-pf button,
    .login-pf input[type="submit"] {
      border-radius: 10px;
      font-weight: 700;
      text-transform: none;
    }

    .login-pf .btn-primary,
    .login-pf .pf-c-button.pf-m-primary {
      background: #0f172a;
      border-color: #0f172a;
    }

    .login-pf .btn-primary:hover,
    .login-pf .pf-c-button.pf-m-primary:hover {
      background: #111827;
      border-color: #111827;
    }

    .login-pf a {
      color: #2563eb;
    }

    .login-pf .alert {
      border-radius: 10px;
      border-color: rgba(148, 163, 184, 0.24);
    }

    .login-pf .login-pf-page .form-control-feedback {
      color: #64748b;
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-postgres
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak-postgres
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-postgres
spec:
  serviceName: {{ include "dcp.fullname" . }}-keycloak-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: keycloak-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.keycloak.database.image.repository }}:{{ .Values.keycloak.database.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.keycloak.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.keycloak.database.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dcp.fullname" . }}-keycloak
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.keycloak.database.username | quote }}
                - -d
                - {{ .Values.keycloak.database.name | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
        labels:
          {{- include "dcp.labels" . | nindent 10 }}
          app.kubernetes.io/component: keycloak-postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.storage.className | quote }}
        resources:
          requests:
            storage: {{ .Values.keycloak.database.storageSize | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - start
            - --import-realm
            - --http-relative-path=/keycloak
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername | quote }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dcp.fullname" . }}-keycloak
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: {{ include "dcp.fullname" . }}-keycloak-postgres
            - name: KC_DB_URL_DATABASE
              value: {{ .Values.keycloak.database.name | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.keycloak.database.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dcp.fullname" . }}-keycloak
                  key: db-password
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HOSTNAME_URL
              value: {{ .Values.keycloak.hostnameUrl | quote }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /keycloak/health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /keycloak/health/live
              port: management
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import/realm.json
              subPath: realm.json
            - name: login-theme
              mountPath: /opt/keycloak/themes
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "dcp.fullname" . }}-keycloak-realm
        - name: login-theme
          configMap:
            name: {{ include "dcp.fullname" . }}-keycloak-theme
            items:
              - key: theme.properties
                path: dcp/login/theme.properties
              - key: messages_ja.properties
                path: dcp/login/messages/messages_ja.properties
              - key: dcp.css
                path: dcp/login/resources/css/dcp.css
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dcp.fullname" . }}-keycloak
  labels:
    {{- include "dcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keycloak
