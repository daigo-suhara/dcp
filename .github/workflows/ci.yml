name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json
      - run: npm ci
        working-directory: console
      - run: npm run build
        working-directory: console
      - uses: azure/setup-helm@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - run: helm template dcloud charts/dcloud

  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: api/Dockerfile
          - name: project
            dockerfile: internal/project/Dockerfile
          - name: container
            dockerfile: internal/container/Dockerfile
          - name: console
            dockerfile: console/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
