name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/console/package-lock.json
      - run: npm ci
        working-directory: services/console
      - run: npm run build
        working-directory: services/console
      - uses: azure/setup-helm@v4
      - run: helm template dcp charts/dcp

  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - name: dcp-core
            dockerfile: services/core/Dockerfile
          - name: dcp-container-apps
            dockerfile: services/container-apps/Dockerfile
          - name: dcp-console
            dockerfile: services/console/Dockerfile
          - name: hello-world
            dockerfile: services/hello-world/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
